version: '3.8'

services:
  gogs:
    image: gogs/gogs:latest
    container_name: gogs
    ports:
      - "3030:3000"
      - "10022:22"
    volumes:
      - gogs-data:/data
    restart: always

  drone-server:
    image: drone/drone:2
    container_name: drone-server
    ports:
      - "8088:80"
    volumes:
      - drone-data:/data
    restart: always
    environment:
      - DRONE_GOGS_SERVER=http://192.168.1.99:3030
      - DRONE_RPC_SECRET=super-secreto-n3
      - DRONE_SERVER_HOST=192.168.1.99:8088
      - DRONE_SERVER_PROTO=http
      - DRONE_USER_CREATE=username:admin,admin:true

  drone-runner:
    image: drone/drone-runner-docker:1
    container_name: drone-runner
    restart: always
    depends_on:
      - drone-server
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - DRONE_RPC_PROTO=http
      - DRONE_RPC_HOST=drone-server:80
      - DRONE_RPC_SECRET=super-secreto-n3
      - DRONE_RUNNER_CAPACITY=2
      - DRONE_RUNNER_NAME=local-runner

volumes:
  gogs-data:
  drone-data:
